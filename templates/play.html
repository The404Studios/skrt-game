<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Play SKRT DERBY - The ultimate demolition derby arena game. Crash, smash, and destroy!">
<meta name="theme-color" content="#0a0a0a">
<title>Play SKRT DERBY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --accent: #ff3d00;
    --accent2: #00ff88;
    --text: #e0e0e0;
    --text-dim: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'JetBrains Mono', monospace;
    touch-action: none;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Loading screen */
  #loading {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-title {
    font-size: 48px; font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent);
    margin-bottom: 20px;
  }
  .loading-bar-container {
    width: 200px; height: 4px;
    background: #1a1a2e; border-radius: 2px; overflow: hidden;
  }
  .loading-bar {
    width: 0%; height: 100%;
    background: var(--accent2); border-radius: 2px;
    animation: loadingAnim 1.5s ease-in-out infinite;
  }
  @keyframes loadingAnim {
    0% { width: 0%; } 50% { width: 80%; } 100% { width: 100%; }
  }
  .loading-text {
    color: var(--text-dim); font-size: 12px;
    margin-top: 12px; letter-spacing: 2px;
  }

  /* Settings / Main Menu Panel */
  #main-menu {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10,10,15,0.97);
    border: 1px solid #ff3d0066;
    padding: 30px;
    z-index: 100;
    min-width: 320px;
    max-width: 400px;
    border-radius: 4px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(255,61,0,0.15);
  }
  #main-menu h2 {
    color: var(--accent);
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
    text-shadow: 0 0 20px var(--accent);
  }
  #main-menu .subtitle {
    color: var(--accent2);
    text-align: center;
    font-size: 12px;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .menu-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .menu-row label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .menu-row select, .menu-row input {
    background: #1a1a2e;
    color: var(--text);
    border: 1px solid #333;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
    min-width: 120px;
  }
  .menu-row select:focus, .menu-row input:focus {
    border-color: var(--accent);
    outline: none;
  }
  .menu-row input[type="range"] {
    width: 100px;
    cursor: pointer;
  }

  .menu-divider {
    border: none;
    border-top: 1px solid #1a1a2e;
    margin: 16px 0;
  }
  .menu-section-title {
    color: var(--accent2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-align: center;
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    border: none;
    border-radius: 3px;
    transition: all 0.3s;
  }
  .btn-play {
    background: var(--accent);
    color: #fff;
    margin-bottom: 8px;
  }
  .btn-play:hover {
    box-shadow: 0 0 25px var(--accent);
    transform: translateY(-1px);
  }
  .btn-multi {
    background: transparent;
    color: var(--accent2);
    border: 2px solid var(--accent2);
  }
  .btn-multi:hover {
    background: var(--accent2);
    color: #000;
    box-shadow: 0 0 20px var(--accent2);
  }
  .btn-settings {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid #333;
    margin-top: 8px;
    font-size: 11px;
  }
  .btn-settings:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Back button */
  #back-btn {
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(10,10,10,0.8);
    color: var(--text-dim);
    border: 1px solid #333;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    z-index: 10;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-decoration: none;
    transition: all 0.3s;
  }
  #back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Menu toggle */
  #menu-toggle {
    position: fixed;
    top: 16px; right: 16px;
    background: rgba(10,10,10,0.8);
    color: var(--text-dim);
    border: 1px solid #333;
    width: 36px; height: 36px;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  #menu-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* Mobile touch controls */
  #touch-controls {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    z-index: 50;
    pointer-events: none;
  }
  .touch-zone {
    position: absolute;
    bottom: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    pointer-events: auto;
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .touch-zone:active { opacity: 0.6; }
  .touch-steer {
    left: 20px;
    width: 120px;
    height: 120px;
  }
  .touch-boost {
    right: 30px;
    bottom: 50px;
    width: 70px;
    height: 70px;
    background: rgba(255, 61, 0, 0.15);
    border-color: rgba(255, 61, 0, 0.3);
  }
  .touch-boost-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff3d00;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    #touch-controls { display: block; }
  }

  /* Status text */
  #status-bar {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #555;
    font-size: 10px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-title">SKRT DERBY</div>
  <div class="loading-bar-container">
    <div class="loading-bar"></div>
  </div>
  <div class="loading-text">LOADING ARENA...</div>
</div>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="touch-controls">
  <div class="touch-zone touch-steer" id="touch-steer"></div>
  <div class="touch-zone touch-boost" id="touch-boost">
    <span class="touch-boost-label">BOOST</span>
  </div>
</div>

<a href="/" id="back-btn">← Back</a>
<button id="menu-toggle" title="Menu">⚙</button>

<div id="main-menu">
  <h2>SKRT DERBY</h2>
  <div class="subtitle">DEMOLITION ARENA</div>

  <div class="menu-row">
    <label>Car Type</label>
    <select id="setting-car">
      <option value="brawler">Brawler</option>
      <option value="speedster">Speedster</option>
      <option value="tank">Tank</option>
      <option value="drifter">Drifter</option>
      <option value="lightning">Lightning</option>
    </select>
  </div>

  <div class="menu-row" id="skin-row" style="display:none;">
    <label>Skin</label>
    <select id="setting-skin">
      <option value="">Default</option>
    </select>
  </div>

  <div class="menu-row">
    <label>Game Mode</label>
    <select id="setting-mode">
      <option value="deathmatch">Deathmatch</option>
      <option value="team">Team DM</option>
      <option value="battleroyale">Battle Royale</option>
      <option value="koth">King of the Hill</option>
    </select>
  </div>

  <div class="menu-row">
    <label>Arena</label>
    <select id="setting-arena">
      <option value="classic">Classic</option>
      <option value="circular">Circular</option>
      <option value="figure8">Figure-8</option>
      <option value="cross">Cross</option>
      <option value="gauntlet">Gauntlet</option>
      <option value="open">Open</option>
    </select>
  </div>

  <div class="menu-row">
    <label>AI Opponents</label>
    <select id="setting-cars">
      <option value="3">3</option>
      <option value="5">5</option>
      <option value="7" selected>7</option>
      <option value="9">9</option>
    </select>
  </div>

  <div class="menu-row">
    <label>Difficulty</label>
    <select id="setting-difficulty">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="menu-row">
    <label>Time Limit</label>
    <select id="setting-time">
      <option value="60">60s Quick</option>
      <option value="120" selected>120s</option>
      <option value="180">180s</option>
      <option value="300">300s Marathon</option>
    </select>
  </div>

  <div class="menu-row">
    <label>Volume</label>
    <input type="range" id="setting-volume" min="0" max="100" value="30">
  </div>

  <button class="btn btn-play" id="btn-play-solo">🏎 START SOLO</button>

  <hr class="menu-divider">
  <div class="menu-section-title">Multiplayer</div>

  <div class="menu-row">
    <label>Your Name</label>
    <input type="text" id="setting-name" value="Racer" maxlength="16">
  </div>

  <div class="menu-row">
    <label>Room Code</label>
    <input type="text" id="setting-room" value="arena1" maxlength="20">
  </div>

  <button class="btn btn-multi" id="btn-play-multi">🌐 JOIN ROOM</button>
</div>

<div id="status-bar"></div>

<script type="module">
  import GameEngine from '/static/js/game/engine.js';

  const canvas = document.getElementById('gameCanvas');
  const loadingScreen = document.getElementById('loading');
  const mainMenu = document.getElementById('main-menu');
  const menuToggle = document.getElementById('menu-toggle');
  const statusBar = document.getElementById('status-bar');

  let game = null;
  let menuVisible = true;

  // ── Load skins from API ─────────────────────────
  async function loadSkins() {
    try {
      const res = await fetch('/api/users/1');
      const data = await res.json();
      const inventory = data.inventory || [];
      const skins = inventory.filter(item => item.category === 'skin');
      
      if (skins.length > 0) {
        const row = document.getElementById('skin-row');
        const select = document.getElementById('setting-skin');
        row.style.display = 'flex';
        skins.forEach(skin => {
          const opt = document.createElement('option');
          opt.value = skin.name;
          opt.textContent = skin.name;
          select.appendChild(opt);
        });
        // Restore saved skin
        if (settings.skinName) {
          select.value = settings.skinName;
        }
      }
    } catch(e) {}
  }

  // ── Settings ──────────────────────────────────────
  const settings = {
    carType: 'brawler',
    arenaLayout: 'classic',
    gameMode: 'deathmatch',
    totalCars: 8,
    aiDifficulty: 'medium',
    gameTime: 120,
    volume: 0.3,
    playerCount: 1,
    playerName: 'Racer',
    roomCode: 'arena1',
    skinName: '',
  };

  // Load saved settings
  try {
    const saved = JSON.parse(localStorage.getItem('skrt_settings'));
    if (saved) Object.assign(settings, saved);
  } catch(e) {}

  // Apply saved values to form
  document.getElementById('setting-car').value = settings.carType;
  document.getElementById('setting-mode').value = settings.gameMode;
  document.getElementById('setting-arena').value = settings.arenaLayout;
  document.getElementById('setting-cars').value = settings.totalCars - 1;
  document.getElementById('setting-difficulty').value = settings.aiDifficulty;
  document.getElementById('setting-time').value = settings.gameTime;
  document.getElementById('setting-volume').value = Math.round(settings.volume * 100);
  document.getElementById('setting-name').value = settings.playerName;
  document.getElementById('setting-room').value = settings.roomCode;

  function readSettings() {
    settings.carType = document.getElementById('setting-car').value;
    settings.gameMode = document.getElementById('setting-mode').value;
    settings.arenaLayout = document.getElementById('setting-arena').value;
    settings.totalCars = parseInt(document.getElementById('setting-cars').value) + 1;
    settings.aiDifficulty = document.getElementById('setting-difficulty').value;
    settings.gameTime = parseInt(document.getElementById('setting-time').value);
    settings.volume = parseInt(document.getElementById('setting-volume').value) / 100;
    settings.playerName = document.getElementById('setting-name').value || 'Racer';
    settings.roomCode = document.getElementById('setting-room').value || 'arena1';
    const skinSelect = document.getElementById('setting-skin');
    if (skinSelect) settings.skinName = skinSelect.value;
    localStorage.setItem('skrt_settings', JSON.stringify(settings));
  }

  function initGame() {
    if (game) game.destroy();

    game = new GameEngine(canvas);
    game.setConfig(settings);
    game.init();

    // Apply volume
    game.audio.setMasterVolume(settings.volume);

    // Override the input click handler for menu
    const origOnInput = game.input.onAnyInput;
    game.input.onAnyInput = () => {
      if (origOnInput) origOnInput();
      if (menuVisible && game.state === 'menu') {
        startSolo();
      }
    };
  }

  // ── Start Functions ────────────────────────────────

  function startSolo() {
    readSettings();
    hideMenu();
    statusBar.textContent = `Solo | ${settings.totalCars} cars | ${settings.carType.toUpperCase()}`;

    // If game not yet initialized, init it
    if (!game) initGame();
    game.setConfig(settings);
    game.audio.setMasterVolume(settings.volume);
    game.startSinglePlayer();
  }

  function startMulti() {
    readSettings();
    hideMenu();
    statusBar.textContent = `Multi | Room: ${settings.roomCode}`;

    if (!game) initGame();
    game.setConfig(settings);
    game.audio.setMasterVolume(settings.volume);
    game.connectMultiplayer(settings.roomCode, settings.playerName, settings.carType);
  }

  function hideMenu() {
    menuVisible = false;
    mainMenu.style.display = 'none';
  }

  function showMenu() {
    menuVisible = true;
    mainMenu.style.display = 'block';
  }

  // ── Button Handlers ────────────────────────────────

  document.getElementById('btn-play-solo').addEventListener('click', startSolo);
  document.getElementById('btn-play-multi').addEventListener('click', startMulti);

  menuToggle.addEventListener('click', () => {
    if (menuVisible) {
      hideMenu();
    } else {
      showMenu();
    }
  });

  // Escape toggles menu
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (menuVisible) hideMenu();
      else showMenu();
    }
    // Enter starts game
    if (e.key === 'Enter' && menuVisible) {
      startSolo();
    }
  });

  // Initialize game and hide loading
  initGame();
  loadSkins();

  setTimeout(() => {
    loadingScreen.classList.add('hidden');
    setTimeout(() => loadingScreen.remove(), 500);
  }, 1200);

  // Rotating loading tips
  const tips = [
    '💡 Tip: Use SPACE to boost through enemies',
    '💡 Tip: Collect power-ups for game-changing abilities',
    '💡 Tip: EMP blast disables nearby cars for 2 seconds',
    '💡 Tip: Hold the hill zone in KOTH mode to win',
    '💡 Tip: Chain kills within 5 seconds for score multipliers',
    '💡 Tip: Press T to chat in multiplayer',
    '💡 Tip: Press TAB after death to spectate',
    '💡 Tip: Battle Royale zone shrinks — stay inside!',
    '💡 Tip: Buy skins from the shop for visual upgrades',
    '💡 Tip: Top daily score wins the 500 coin bounty',
  ];
  let tipIdx = 0;
  const tipEl = document.querySelector('.loading-text');
  setInterval(() => {
    tipIdx = (tipIdx + 1) % tips.length;
    if (tipEl && !loadingScreen.classList.contains('hidden')) {
      tipEl.textContent = tips[tipIdx];
    }
  }, 2000);

  // Canvas click for audio context
  canvas.addEventListener('click', () => {
    if (game && game.audio) {
      game.audio.resume();
    }
  });

  // Mobile boost button
  const boostBtn = document.getElementById('touch-boost');
  if (boostBtn) {
    boostBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (game && game.input) {
        game.input.keys['Space'] = true;
      }
    });
    boostBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (game && game.input) {
        game.input.keys['Space'] = false;
      }
    });
  }
</script>
</body>
</html>
