<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Play SKRT DERBY - The ultimate demolition derby arena game. Crash, smash, and destroy!">
<meta name="theme-color" content="#0a0a0a">
<title>Play SKRT DERBY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --accent: #ff3d00;
    --accent2: #00ff88;
    --text: #e0e0e0;
    --text-dim: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'JetBrains Mono', monospace;
    touch-action: none;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Loading screen */
  #loading {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-title {
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent);
    margin-bottom: 20px;
  }
  .loading-bar-container {
    width: 200px;
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    width: 0%;
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    animation: loadingAnim 1.5s ease-in-out infinite;
  }
  @keyframes loadingAnim {
    0% { width: 0%; }
    50% { width: 80%; }
    100% { width: 100%; }
  }
  .loading-text {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 12px;
    letter-spacing: 2px;
  }

  /* Settings panel */
  #settings-panel {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15,15,20,0.98);
    border: 1px solid #ff3d0044;
    padding: 30px;
    z-index: 100;
    min-width: 300px;
    display: none;
    backdrop-filter: blur(10px);
  }
  #settings-panel.active { display: block; }
  #settings-panel h3 {
    color: var(--accent);
    text-align: center;
    margin-bottom: 20px;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .setting-row label {
    color: var(--text-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .setting-row select, .setting-row input[type="range"] {
    background: #1a1a2e;
    color: var(--text);
    border: 1px solid #333;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .setting-row select:focus { border-color: var(--accent); outline: none; }
  .setting-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s;
  }
  .setting-btn:hover { box-shadow: 0 0 20px var(--accent); }
  .setting-btn.secondary {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    margin-top: 8px;
  }

  /* Back button */
  #back-btn {
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(10,10,10,0.8);
    color: var(--text-dim);
    border: 1px solid #333;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    z-index: 10;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-decoration: none;
    transition: all 0.3s;
  }
  #back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Settings gear */
  #settings-toggle {
    position: fixed;
    top: 16px; right: 16px;
    background: rgba(10,10,10,0.8);
    color: var(--text-dim);
    border: 1px solid #333;
    width: 36px; height: 36px;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  #settings-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* Mobile controls info */
  #mobile-info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-dim);
    font-size: 10px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 1px;
    background: rgba(0,0,0,0.6);
    padding: 6px 14px;
    border-radius: 4px;
  }

  @media (min-width: 769px) {
    #mobile-info { display: none; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-title">SKRT DERBY</div>
  <div class="loading-bar-container">
    <div class="loading-bar"></div>
  </div>
  <div class="loading-text">LOADING ARENA...</div>
</div>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
</div>

<a href="/" id="back-btn">← Back</a>
<button id="settings-toggle" title="Settings">⚙</button>

<div id="settings-panel">
  <h3>Game Settings</h3>
  <div class="setting-row">
    <label>Players</label>
    <select id="setting-players">
      <option value="1">1 Player</option>
      <option value="2">2 Players (Local)</option>
    </select>
  </div>
  <div class="setting-row">
    <label>AI Cars</label>
    <select id="setting-cars">
      <option value="5">5 Opponents</option>
      <option value="7" selected>7 Opponents</option>
      <option value="3">3 Opponents</option>
      <option value="1">1 Opponent</option>
    </select>
  </div>
  <div class="setting-row">
    <label>AI Difficulty</label>
    <select id="setting-difficulty">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>
  <div class="setting-row">
    <label>Time Limit</label>
    <select id="setting-time">
      <option value="60">60s (Quick)</option>
      <option value="120" selected>120s (Normal)</option>
      <option value="180">180s (Long)</option>
      <option value="300">300s (Marathon)</option>
    </select>
  </div>
  <div class="setting-row">
    <label>Volume</label>
    <input type="range" id="setting-volume" min="0" max="100" value="50">
  </div>
  <button class="setting-btn" id="apply-settings">Apply & Start</button>
  <button class="setting-btn secondary" id="close-settings">Cancel</button>
</div>

<div id="mobile-info">DRAG LEFT SIDE TO STEER</div>

<script type="module">
  import GameEngine from '/static/js/game/engine.js';

  const canvas = document.getElementById('gameCanvas');
  const loadingScreen = document.getElementById('loading');
  const settingsPanel = document.getElementById('settings-panel');
  const settingsToggle = document.getElementById('settings-toggle');
  const closeSettings = document.getElementById('close-settings');
  const applySettings = document.getElementById('apply-settings');
  const backBtn = document.getElementById('back-btn');

  let game = null;

  // Settings
  const settings = {
    playerCount: 1,
    totalCars: 7,
    aiDifficulty: 'medium',
    gameTime: 120,
    volume: 0.5,
  };

  // Load saved settings
  try {
    const saved = JSON.parse(localStorage.getItem('skrt_settings'));
    if (saved) Object.assign(settings, saved);
  } catch(e) {}

  // Apply saved values to form
  document.getElementById('setting-players').value = settings.playerCount;
  document.getElementById('setting-cars').value = settings.totalCars - settings.playerCount;
  document.getElementById('setting-difficulty').value = settings.aiDifficulty;
  document.getElementById('setting-time').value = settings.gameTime;
  document.getElementById('setting-volume').value = Math.round(settings.volume * 100);

  function initGame() {
    if (game) {
      game.destroy();
    }

    game = new GameEngine(canvas);
    settings.totalCars = settings.playerCount + parseInt(document.getElementById('setting-cars').value);
    game.setConfig(settings);
    game.init();

    // Apply volume
    game.audio.setMasterVolume(settings.volume);

    // Save settings
    localStorage.setItem('skrt_settings', JSON.stringify(settings));
  }

  // Initialize
  initGame();

  // Hide loading
  setTimeout(() => {
    loadingScreen.classList.add('hidden');
    setTimeout(() => loadingScreen.remove(), 500);
  }, 1500);

  // Settings toggle
  settingsToggle.addEventListener('click', () => {
    const isActive = settingsPanel.classList.contains('active');
    if (isActive) {
      settingsPanel.classList.remove('active');
    } else {
      settingsPanel.classList.add('active');
    }
  });

  closeSettings.addEventListener('click', () => {
    settingsPanel.classList.remove('active');
  });

  applySettings.addEventListener('click', () => {
    settings.playerCount = parseInt(document.getElementById('setting-players').value);
    settings.aiDifficulty = document.getElementById('setting-difficulty').value;
    settings.gameTime = parseInt(document.getElementById('setting-time').value);
    settings.volume = parseInt(document.getElementById('setting-volume').value) / 100;

    settingsPanel.classList.remove('active');
    initGame();
  });

  // Keyboard shortcut for settings
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const isActive = settingsPanel.classList.contains('active');
      if (isActive) {
        settingsPanel.classList.remove('active');
      } else {
        settingsPanel.classList.add('active');
      }
    }
  });

  // Handle fullscreen on click (for audio context)
  canvas.addEventListener('click', () => {
    if (game && game.audio) {
      game.audio.resume();
    }
  });
</script>
</body>
</html>
