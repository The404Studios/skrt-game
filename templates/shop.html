<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - SKRT DERBY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#0a0a0a;--bg2:#0f0f14;--bg3:#16161f;--accent:#ff3d00;--accent2:#00ff88;--text:#e0e0e0;--text-dim:#888;--border:#1a1a2e;}

  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}

  .bg-grid{
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(255,61,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,61,0,0.03) 1px,transparent 1px);
    background-size:60px 60px;
  }

  nav{
    position:relative;z-index:10;
    background:rgba(10,10,10,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px;
  }
  .nav-logo{font-size:24px;font-weight:800;color:var(--accent);text-decoration:none;text-shadow:0 0 20px var(--accent);}
  .nav-logo span{color:var(--accent2);}
  .nav-links{display:flex;gap:20px;list-style:none;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:color 0.3s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:8px 20px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;text-decoration:none;}
  .nav-cta:hover{box-shadow:0 0 20px var(--accent);}

  @media(max-width:768px){.nav-links{display:none;}}

  .container{max-width:1000px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}

  .page-title{text-align:center;font-size:clamp(28px,5vw,36px);font-weight:800;margin-bottom:8px;}
  .page-title span{color:var(--accent2);}
  .page-subtitle{text-align:center;color:var(--text-dim);margin-bottom:8px;font-size:13px;letter-spacing:2px;}

  .currency-bar{
    display:flex;justify-content:center;align-items:center;gap:30px;margin-bottom:30px;flex-wrap:wrap;
  }
  .currency-item{
    background:var(--bg2);border:1px solid var(--border);padding:12px 24px;text-align:center;min-width:120px;
  }
  .currency-val{font-size:24px;font-weight:800;color:var(--accent2);}
  .currency-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-top:4px;}

  .shop-tabs{display:flex;gap:4px;margin-bottom:30px;justify-content:center;flex-wrap:wrap;}
  .shop-tab{
    background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);
    padding:10px 20px;font-family:inherit;font-weight:700;font-size:11px;
    text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.3s;
  }
  .shop-tab.active,.shop-tab:hover{color:var(--accent);border-color:var(--accent);}

  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}

  .shop-item{
    background:var(--bg3);border:1px solid var(--border);padding:20px;text-align:center;transition:all 0.3s;position:relative;overflow:hidden;
  }
  .shop-item:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 10px 30px rgba(255,61,0,0.1);}
  .shop-item.owned{border-color:var(--accent2);opacity:0.7;}
  .shop-item.owned::after{content:'OWNED';position:absolute;top:10px;right:10px;background:var(--accent2);color:#000;font-size:9px;font-weight:800;padding:2px 8px;letter-spacing:1px;}

  .item-icon{font-size:64px;margin-bottom:12px;display:block;}
  .item-name{font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .item-desc{font-size:11px;color:var(--text-dim);margin-bottom:14px;line-height:1.5;min-height:32px;}
  .item-rarity{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .rarity-common{color:#888;}
  .rarity-rare{color:#0088ff;}
  .rarity-epic{color:#aa44ff;}
  .rarity-legendary{color:#ffd700;}

  .buy-btn{
    width:100%;background:var(--accent);color:#fff;border:none;padding:10px;font-family:inherit;font-weight:700;font-size:12px;
    text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.3s;
  }
  .buy-btn:hover{box-shadow:0 0 20px var(--accent);}
  .buy-btn:disabled{background:#333;color:#666;cursor:not-allowed;box-shadow:none;}
  .buy-btn.bought{background:var(--accent2);color:#000;}

  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;
    padding:12px 24px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;
    transition:all 0.3s;opacity:0;pointer-events:none;
  }
  .toast.show{opacity:1;}
  .toast.success{background:var(--accent2);color:#000;}
  .toast.error{background:var(--accent);color:#fff;}

  footer{
    position:relative;z-index:1;padding:40px 20px;border-top:1px solid var(--border);text-align:center;
  }
  footer .footer-text{color:var(--text-dim);font-size:12px;}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">SKRT<span>.DERBY</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/play">Play</a></li>
      <li><a href="/leaderboard">Leaderboard</a></li>
      <li><a href="/shop" class="active">Shop</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <a href="/play" class="nav-cta">PLAY NOW</a>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">🛒 <span>SHOP</span></h1>
  <p class="page-subtitle">CUSTOMIZE YOUR RIDE</p>

  <div class="currency-bar">
    <div class="currency-item">
      <div class="currency-val" id="coins">--</div>
      <div class="currency-label">Coins</div>
    </div>
    <div class="currency-item">
      <div class="currency-val" id="games">--</div>
      <div class="currency-label">Games Played</div>
    </div>
  </div>

  <div class="shop-tabs">
    <button class="shop-tab active" data-cat="all">All</button>
    <button class="shop-tab" data-cat="skin">Skins</button>
    <button class="shop-tab" data-cat="upgrade">Upgrades</button>
    <button class="shop-tab" data-cat="cosmetic">Cosmetics</button>
  </div>

  <div class="shop-grid" id="shop-grid">
    <div style="text-align:center;padding:40px;color:var(--text-dim);grid-column:1/-1;">
      Loading shop...
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p class="footer-text">&copy; 2026 SKRT DERBY. All rights reserved.</p>
</footer>

<script>
  const USER_ID = 1;
  let shopItems = [];
  let userCoins = 0;
  let inventory = [];
  let currentCat = 'all';

  const iconMap = {
    'Speed Demon': '🏎️', 'Neon Phantom': '👻', 'Ice King': '❄️', 'Gold Rush': '👑',
    'Armor Plating': '🛡️', 'Turbo Boost': '⚡', 'Repair Kit': '🔧', 'Ram Shield': '💥',
    'EMP Blast': '⚡', 'Battle Horn': '📢', 'Smoke Trail': '💨', 'Victory Dance': '🕺',
  };

  async function loadData() {
    try {
      const [shopRes, userRes] = await Promise.all([
        fetch('/api/shop/items'),
        fetch(`/api/users/${USER_ID}`)
      ]);
      const shopData = await shopRes.json();
      const userData = await userRes.json();

      if (shopData) shopItems = shopData.map(item => ({ ...item, icon: iconMap[item.name] || '🎁' }));
      if (userData.user) {
        userCoins = userData.user.coins || 0;
        document.getElementById('coins').textContent = userCoins.toLocaleString();
        document.getElementById('games').textContent = userData.user.games_played || 0;
      }
      if (userData.inventory) {
        inventory = userData.inventory.map(i => i.id);
      }
      renderShop();
    } catch (e) {
      document.getElementById('shop-grid').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--accent);grid-column:1/-1;">Failed to load shop. Make sure the game server is running.</div>';
    }
  }

  function renderShop() {
    const grid = document.getElementById('shop-grid');
    const items = currentCat === 'all' ? shopItems : shopItems.filter(i => i.category === currentCat);

    if (items.length === 0) {
      grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);grid-column:1/-1;">No items in this category</div>';
      return;
    }

    grid.innerHTML = items.map(item => {
      const owned = inventory.includes(item.id);
      const canAfford = userCoins >= item.price;
      return `
        <div class="shop-item ${owned ? 'owned' : ''}">
          <span class="item-icon">${item.icon}</span>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.data || ''}</div>
          <div class="item-rarity rarity-${item.rarity || 'common'}">${(item.rarity || 'common').toUpperCase()}</div>
          <button class="buy-btn ${owned ? 'bought' : ''}" 
            ${owned ? 'disabled' : ''} 
            ${!canAfford && !owned ? 'disabled' : ''}
            onclick="buyItem(${item.id}, ${item.price})">
            ${owned ? '✓ OWNED' : canAfford ? `💰 ${item.price}` : `🔒 ${item.price}`}
          </button>
        </div>
      `;
    }).join('');
  }

  window.buyItem = async function(itemId, price) {
    try {
      const res = await fetch('/api/shop/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: USER_ID, item_id: itemId })
      });
      const data = await res.json();

      if (data.error) {
        showToast(data.error, 'error');
      } else {
        userCoins = data.coins_left;
        inventory.push(itemId);
        document.getElementById('coins').textContent = userCoins.toLocaleString();
        renderShop();
        showToast('Purchased!', 'success');
      }
    } catch (e) {
      showToast('Purchase failed', 'error');
    }
  };

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  document.querySelectorAll('.shop-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderShop();
    });
  });

  loadData();
</script>
</body>
</html>
