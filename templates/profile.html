<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - SKRT DERBY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#0a0a0a;--bg2:#0f0f14;--bg3:#16161f;--accent:#ff3d00;--accent2:#00ff88;--text:#e0e0e0;--text-dim:#888;--border:#1a1a2e;--glow:0 0 20px;}

  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}

  .bg-grid{
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(255,61,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,61,0,0.03) 1px,transparent 1px);
    background-size:60px 60px;
  }

  nav{
    position:relative;z-index:10;
    background:rgba(10,10,10,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px;
  }
  .nav-logo{font-size:24px;font-weight:800;color:var(--accent);text-decoration:none;text-shadow:var(--glow) var(--accent);}
  .nav-logo span{color:var(--accent2);}
  .nav-links{display:flex;gap:20px;list-style:none;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:color 0.3s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:8px 20px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;text-decoration:none;}
  .nav-cta:hover{box-shadow:var(--glow) var(--accent);}

  @media(max-width:768px){.nav-links{display:none;}}

  .container{max-width:800px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}

  /* Profile header */
  .profile-header{
    display:flex;gap:30px;align-items:center;margin-bottom:40px;flex-wrap:wrap;
    background:var(--bg2);border:1px solid var(--border);padding:30px;
  }
  .avatar{
    width:80px;height:80px;border-radius:50%;background:var(--bg3);border:2px solid var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;
  }
  .profile-info h2{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:4px;}
  .profile-info .title{font-size:12px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .profile-info .bio{font-size:13px;color:var(--text-dim);line-height:1.6;}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:40px;}
  .stat-card{
    background:var(--bg3);border:1px solid var(--border);padding:20px;text-align:center;transition:all 0.3s;
  }
  .stat-card:hover{border-color:var(--accent);}
  .stat-card .stat-icon{font-size:28px;margin-bottom:8px;}
  .stat-card .stat-value{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:4px;}
  .stat-card .stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;}

  .spinner{text-align:center;padding:40px;color:var(--text-dim);}
  .spinner::after{content:'...';animation:dots 1.5s infinite;}
  @keyframes dots{0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';}}

  .section-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:20px;text-transform:uppercase;letter-spacing:2px;}
  .section-title span{color:var(--accent2);}

  .match-list{display:flex;flex-direction:column;gap:8px;margin-bottom:40px;}
  .match-item{
    display:grid;grid-template-columns:100px 1fr 80px 60px;
    padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
    align-items:center;gap:12px;font-size:12px;
  }
  .match-item:nth-child(odd){border-left:3px solid var(--accent2);}
  .match-score{color:var(--accent);font-weight:700;}
  .match-kills{color:var(--accent2);}
  .match-car{color:var(--text-dim);}

  .empty-state{text-align:center;padding:40px;color:var(--text-dim);}
  .empty-state .btn{display:inline-block;margin-top:12px;background:var(--accent);color:#fff;padding:10px 24px;text-decoration:none;font-family:inherit;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:2px;}

  footer{
    position:relative;z-index:1;padding:40px 20px;border-top:1px solid var(--border);text-align:center;
  }
  footer .footer-text{color:var(--text-dim);font-size:12px;}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">SKRT<span>.DERBY</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/play">Play</a></li>
      <li><a href="/leaderboard">Leaderboard</a></li>
      <li><a href="/shop">Shop</a></li>
      <li><a href="/profile" class="active">Profile</a></li>
    </ul>
    <a href="/play" class="nav-cta">PLAY NOW</a>
  </div>
</nav>

<div class="container" id="profile-content">
  <div class="spinner">Loading profile</div>
</div>

<footer>
  <p class="footer-text">&copy; 2026 SKRT DERBY. All rights reserved.</p>
</footer>

<script>
  const USER_ID = 1;

  async function loadProfile() {
    try {
      const res = await fetch(`/api/users/${USER_ID}`);
      const data = await res.json();

      if (!data.user) {
        document.getElementById('profile-content').innerHTML = `
          <div class="empty-state">
            <h3 style="font-size:20px;color:var(--accent);margin-bottom:12px;">No Profile Yet</h3>
            <p style="color:var(--text-dim);margin-bottom:24px;">Play a game to create your profile and start tracking stats!</p>
            <a href="/play" class="btn">PLAY NOW</a>
          </div>
        `;
        return;
      }

      const u = data.user;
      const scores = data.recent_scores || [];
      const bestScore = scores.length > 0 ? Math.max(...scores.map(s => s.score)) : 0;
      const totalKills = scores.reduce((sum, s) => sum + (s.kills || 0), 0);
      const totalCoins = u.coins || 0;
      const inventory = data.inventory || [];

      // Determine title based on stats
      let title = 'Rookie Driver';
      if (u.wins >= 50) title = 'Arena King';
      else if (u.wins >= 20) title = 'Veteran';
      else if (u.wins >= 5) title = 'Skilled Driver';
      else if (u.games_played >= 10) title = 'Rising Star';

      document.getElementById('profile-content').innerHTML = `
        <div class="profile-header">
          <div class="avatar">🏎️</div>
          <div class="profile-info">
            <h2>${u.username || 'Driver'}</h2>
            <div class="title">${title}</div>
            <div class="bio">${u.games_played || 0} games played · ${totalCoins.toLocaleString()} coins · ${inventory.length} items owned</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div class="stat-value">${bestScore.toLocaleString()}</div>
            <div class="stat-label">Best Score</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">💥</div>
            <div class="stat-value">${totalKills}</div>
            <div class="stat-label">Total Kills</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🎮</div>
            <div class="stat-value">${u.games_played || 0}</div>
            <div class="stat-label">Games Played</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👑</div>
            <div class="stat-value">${u.wins || 0}</div>
            <div class="stat-label">Victories</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-value">${totalCoins.toLocaleString()}</div>
            <div class="stat-label">Coins</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🎁</div>
            <div class="stat-value">${inventory.length}</div>
            <div class="stat-label">Items Owned</div>
          </div>
        </div>

        <h3 class="section-title">📋 <span>Recent Matches</span></h3>
        ${scores.length === 0 ? '<div class="empty-state">No matches played yet. <a href="/play" class="btn">PLAY NOW</a></div>' : `
          <div class="match-list">
            ${scores.slice(0, 10).map(s => `
              <div class="match-item">
                <div class="match-car">${s.car_type || 'default'}</div>
                <div class="match-score">${(s.score || 0).toLocaleString()} pts</div>
                <div class="match-kills">${s.kills || 0} kills</div>
                <div style="color:var(--text-dim);font-size:11px;">${s.played_at ? new Date(s.played_at).toLocaleDateString() : '--'}</div>
              </div>
            `).join('')}
          </div>
        `}

        ${inventory.length > 0 ? `
          <h3 class="section-title">🎁 <span>Inventory</span></h3>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:40px;">
            ${inventory.map(item => `
              <span style="background:var(--bg3);border:1px solid var(--border);padding:6px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;">
                ${item.name || 'Item'}
              </span>
            `).join('')}
          </div>
        ` : ''}
      `;
    } catch (e) {
      document.getElementById('profile-content').innerHTML = `
        <div class="empty-state">
          <p style="color:var(--accent);">Failed to load profile. Is the server running?</p>
        </div>
      `;
    }
  }

  loadProfile();
</script>
</body>
</html>
