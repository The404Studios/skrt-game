<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - SKRT DERBY</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#0a0a0a;--bg2:#0f0f14;--bg3:#16161f;--accent:#ff3d00;--accent2:#00ff88;--text:#e0e0e0;--text-dim:#888;--border:#1a1a2e;--glow:0 0 20px;}

  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}

  .bg-grid{
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(255,61,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,61,0,0.03) 1px,transparent 1px);
    background-size:60px 60px;
  }

  nav{
    position:relative;z-index:10;
    background:rgba(10,10,10,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px;
  }
  .nav-logo{font-size:24px;font-weight:800;color:var(--accent);text-decoration:none;text-shadow:var(--glow) var(--accent);}
  .nav-logo span{color:var(--accent2);}
  .nav-links{display:flex;gap:20px;list-style:none;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:color 0.3s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:8px 20px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;text-decoration:none;}
  .nav-cta:hover{box-shadow:var(--glow) var(--accent);}

  @media(max-width:768px){.nav-links{display:none;}}

  .container{max-width:800px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}

  .page-title{text-align:center;font-size:clamp(28px,5vw,40px);font-weight:800;margin-bottom:8px;}
  .page-title span{color:var(--accent2);}
  .page-subtitle{text-align:center;color:var(--text-dim);margin-bottom:40px;font-size:13px;letter-spacing:2px;}

  .tabs{display:flex;gap:4px;margin-bottom:30px;justify-content:center;}
  .tab-btn{
    background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);
    padding:10px 24px;font-family:inherit;font-weight:700;font-size:12px;
    text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.3s;
  }
  .tab-btn.active,.tab-btn:hover{color:var(--accent);border-color:var(--accent);}

  .lb-header{
    display:grid;grid-template-columns:60px 1fr 100px 80px 100px;
    padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
    font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:700;
  }
  .lb-row{
    display:grid;grid-template-columns:60px 1fr 100px 80px 100px;
    padding:14px 16px;border-bottom:1px solid var(--border);transition:all 0.3s;align-items:center;
  }
  .lb-row:hover{background:var(--bg3);}
  .lb-rank{font-weight:800;font-size:16px;}
  .lb-rank.gold{color:#ffd700;}
  .lb-rank.silver{color:#c0c0c0;}
  .lb-rank.bronze{color:#cd7f32;}
  .lb-player{font-size:14px;font-weight:700;}
  .lb-player .you{color:var(--accent2);}
  .lb-score{color:var(--accent2);font-weight:700;font-size:14px;}
  .lb-kills{color:var(--accent);font-weight:700;}
  .lb-games{color:var(--text-dim);font-size:12px;}

  .your-rank{
    margin-top:30px;padding:16px;background:var(--bg2);border:1px solid var(--accent);text-align:center;
  }
  .your-rank h4{color:var(--accent2);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .your-rank .stats{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;}
  .your-rank .stat-num{font-size:22px;font-weight:800;color:var(--accent);}
  .your-rank .stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;}

  footer{
    position:relative;z-index:1;padding:40px 20px;border-top:1px solid var(--border);text-align:center;
  }
  footer .footer-text{color:var(--text-dim);font-size:12px;}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">SKRT<span>.DERBY</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/play">Play</a></li>
      <li><a href="/leaderboard" class="active">Leaderboard</a></li>
      <li><a href="/shop">Shop</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <a href="/play" class="nav-cta">PLAY NOW</a>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">🏆 <span>LEADERBOARD</span></h1>
  <p class="page-subtitle">TOP DRIVERS IN THE ARENA</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all">All Time</button>
    <button class="tab-btn" data-tab="best">Best Score</button>
    <button class="tab-btn" data-tab="kills">Most Kills</button>
  </div>

  <div class="lb-header">
    <div>RANK</div><div>PLAYER</div><div>SCORE</div><div>KILLS</div><div>GAMES</div>
  </div>
  <div id="lb-rows">
    <div style="text-align:center;padding:40px;color:var(--text-dim);">
      Loading leaderboard...
    </div>
  </div>

  <div class="your-rank" id="your-rank" style="display:none;">
    <h4>Your Stats</h4>
    <div class="stats">
      <div><div class="stat-num" id="yr-best">0</div><div class="stat-label">Best Score</div></div>
      <div><div class="stat-num" id="yr-kills">0</div><div class="stat-label">Total Kills</div></div>
      <div><div class="stat-num" id="yr-games">0</div><div class="stat-label">Games Played</div></div>
      <div><div class="stat-num" id="yr-wins">0</div><div class="stat-label">Wins</div></div>
    </div>
  </div>
</div>

<footer>
  <p class="footer-text">&copy; 2026 SKRT DERBY. All rights reserved.</p>
</footer>

<script>
  let leaderboardData = [];
  let userStats = null;

  function getRankClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return '';
  }

  function renderLeaderboard(data) {
    const rows = document.getElementById('lb-rows');
    if (!data || data.length === 0) {
      rows.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No scores yet. Play a game!</div>';
      return;
    }
    rows.innerHTML = data.map(d => `
      <div class="lb-row">
        <div class="lb-rank ${getRankClass(d.rank)}">#${d.rank}</div>
        <div class="lb-player">${d.username || 'Player'}</div>
        <div class="lb-score">${(d.score || 0).toLocaleString()}</div>
        <div class="lb-kills">${d.kills || 0}</div>
        <div class="lb-games">${d.games || d.games_played || 0}</div>
      </div>
    `).join('');
  }

  async function loadData() {
    try {
      const [lbRes, userRes] = await Promise.all([
        fetch('/api/leaderboard'),
        fetch('/api/users/1')
      ]);
      const lbData = await lbRes.json();
      const userData = await userRes.json();

      if (lbData) {
        leaderboardData = lbData.map((d, i) => ({
          ...d,
          rank: i + 1,
        }));
        renderLeaderboard(leaderboardData);
      }

      if (userData.user) {
        const u = userData.user;
        const scores = userData.recent_scores || [];
        const bestScore = scores.length > 0 ? Math.max(...scores.map(s => s.score)) : 0;
        const totalKills = scores.reduce((sum, s) => sum + (s.kills || 0), 0);

        document.getElementById('your-rank').style.display = 'block';
        document.getElementById('yr-best').textContent = bestScore.toLocaleString();
        document.getElementById('yr-kills').textContent = totalKills;
        document.getElementById('yr-games').textContent = u.games_played || 0;
        document.getElementById('yr-wins').textContent = u.wins || 0;
        userStats = { bestScore, totalKills, games: u.games_played, wins: u.wins };
      }
    } catch (e) {
      document.getElementById('lb-rows').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--accent);">Failed to load data. Is the server running?</div>';
    }
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      let sorted = [...leaderboardData];
      if (tab === 'best') {
        sorted.sort((a, b) => (b.best || b.score || 0) - (a.best || a.score || 0));
      } else if (tab === 'kills') {
        sorted.sort((a, b) => (b.kills || 0) - (a.kills || 0));
      } else {
        sorted.sort((a, b) => (b.total || b.score || 0) - (a.total || a.score || 0));
      }
      sorted = sorted.map((d, i) => ({ ...d, rank: i + 1 }));
      renderLeaderboard(sorted);
    });
  });

  loadData();
</script>
</body>
</html>
